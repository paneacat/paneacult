<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>paneacult</title>

<style>
:root {
  --gold:#ffbf00;
  --bg:#0f1720;
  --card:#16202a;
}

body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:var(--bg);
  color:#e6edf3;
}

/* HEADER */
header {
  text-align:center;
  padding:30px 20px;
}

h1 {
  color:var(--gold);
  margin:0;
}

.subtitle {
  opacity:0.6;
  margin-top:5px;
}

/* FILTRI */
.filtri {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin:20px;
}

.filtri button {
  padding:8px 14px;
  border-radius:20px;
  border:none;
  background:#1f2a35;
  color:white;
  cursor:pointer;
}

.filtri button:hover {
  background:var(--gold);
  color:black;
}

/* HERO */
.featured {
  max-width:900px;
  margin:20px auto;
  position:relative;
  border-radius:16px;
  overflow:hidden;
}

.featured img {
  width:100%;
  height:300px;
  object-fit:cover;
  filter:brightness(0.6);
}

.featured-content {
  position:absolute;
  bottom:20px;
  left:20px;
}

.featured h2 {
  margin:0;
}

.featured a {
  color:white;
  text-decoration:none;
}

/* GRID */
.grid {
  max-width:900px;
  margin:auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}

.card {
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
  transition:0.2s;
}

.card:hover {
  transform:translateY(-4px);
}

.card img {
  width:100%;
  height:160px;
  object-fit:cover;
}

.card-content {
  padding:15px;
}

.card h3 {
  margin:0 0 5px;
}

.card p {
  margin:0;
  opacity:0.6;
  font-size:14px;
}

.card a {
  color:white;
  text-decoration:none;
}

/* MOBILE */
@media(max-width:700px){
  .grid {
    grid-template-columns:1fr;
  }
}

footer {
  text-align:center;
  padding:20px;
  opacity:0.6;
}
</style>
</head>

<body>

<header>
  <h1>paneacult</h1>
  <div class="subtitle">Cinema che resta</div>
</header>

<!-- FILTRI -->
<div class="filtri">
  <button onclick="filtra('tutti')">Tutti</button>
  <button onclick="filtra('resta')">Cinema che resta</button>
  <button onclick="filtra('drama')">Drama</button>
  <button onclick="filtra('noir')">Noir</button>
</div>

<!-- HERO -->
<div class="card featured" data-tags="resta satira anni40">
  <a href="dittatore.html">
    <img src="img/Grandedittatore2.jpg">
    <div class="featured-content">
      <h2>Il grande Dittatore</h2>
      <p>Charlie Chaplin (1940)</p>
    </div>
  </a>
</div>

<!-- GRID -->
<div class="grid">

  <!-- UNCUT -->
  <div class="card" data-tags="crime drama anni2010">
    <a href="uncut.html">
      <img src="img/uncut.jpg">
      <div class="card-content">
        <h3>Uncut Gems</h3>
        <p>Safdie Brothers (2019)</p>
      </div>
    </a>
  </div>

  <!-- SUNSET -->
  <div class="card" data-tags="resta noir anni50">
    <a href="tramonto.html">
      <img src="img/viale-del-tramonto.jpg">
      <div class="card-content">
        <h3>Sunset Boulevard</h3>
        <p>Billy Wilder (1950)</p>
      </div>
    </a>
  </div>

</div>

<footer>
© 2026 paneacult
</footer>

<script>
function filtra(tag) {
  const cards = document.querySelectorAll('.card');

  cards.forEach(card => {
    const tags = card.dataset.tags;

    if (tag === 'tutti' || tags.includes(tag)) {
      card.style.display = 'block';
    } else {
      card.style.display = 'none';
    }
  });
}
</script>

</body>
</html>
