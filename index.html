<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>paneacult</title>

<style>
body {
  background: #0f1f2a;
  color: white;
  font-family: Arial, sans-serif;
  margin: 0;
}

/* HEADER */
h1 {
  text-align: center;
  color: #ffbf00;
  margin: 20px 0;
}

/* FILTRI */
.filtri {
  text-align: center;
  margin-bottom: 20px;
}

.filtro {
  background: transparent;
  color: white;
  border: 1px solid transparent;
  padding: 6px 12px;
  margin: 5px;
  cursor: pointer;
  transition: all 0.25s;
}

.filtro:hover {
  color: #ffbf00;
}

.filtro.attivo {
  color: #ffbf00;
  border-color: #ffbf00;
  box-shadow: 0 0 8px rgba(255,191,0,0.7);
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* CARD */
.card {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.3s;
}

.card img {
  width: 100%;
  display: block;
}

/* HOVER */
.card:hover {
  transform: scale(1.08);
  z-index: 2;
}

.overlay {
  position: absolute;
  bottom: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
  width: 100%;
  padding: 10px;
  opacity: 0;
  transition: 0.3s;
}

.card:hover .overlay {
  opacity: 1;
}

.overlay h3 {
  margin: 0;
  font-size: 14px;
}

.overlay p {
  font-size: 12px;
  color: #ffbf00;
}

/* HIDE */
.nascosta {
  display: none;
}
</style>
</head>

<body>

<h1>paneacult</h1>

  <!-- SCRIPT -->
  <script>
const filtri = document.querySelectorAll('.filtro');
const cards = document.querySelectorAll('.card');

filtri.forEach(filtro => {
  filtro.addEventListener('click', () => {

    filtri.forEach(f => f.classList.remove('attivo'));
    filtro.classList.add('attivo');

    const categoria = filtro.dataset.filtro;

    cards.forEach(card => {
      const tags = card.dataset.tag;

      if (categoria === "tutti" || tags.includes(categoria)) {
        card.classList.remove('nascosta');
      } else {
        card.classList.add('nascosta');
      }
    });

  });
});
  </script>
</body>
</html>
