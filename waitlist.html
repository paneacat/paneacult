<form id="waitlist-form">

  <input
    id="waitlist-name"
    type="text"
    placeholder="Il tuo nome"
    required>

  <input
    id="waitlist-email"
    type="email"
    placeholder="La tua email"
    required>

  <button type="submit">
    🚀 Entra nella lista d'attesa
  </button>

  <p id="waitlist-message"></p>

</form>
