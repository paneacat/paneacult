  ========================= -->

    content="website"
  >

  ========================= -->
<link rel="stylesheet" href="css/explore.css">
  <link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/review.css">
<link rel="stylesheet" href="css/mobile.css">
  

</head>

<body class="add-review-body">

  <!-- =========================
       HEADER
  ========================= -->

  <header class="profile-header">

  <div class="profile-header-inner">

    <a
      href="index.html"
      class="profile-logo"
    >
      paneacult
    </a>

    <nav class="profile-nav">

  <a
    href="index.html"
  >
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <a
    href="add-review.html"
  >
    <i class="fa-solid fa-film"></i>
    <span>Database</span>
  </a>

  <a
  href="profilo.html"
>
  <i class="fa-solid fa-user"></i>
  <span>Profilo</span>
  </a>
<a href="explore.html"
  class="active">  
  Esplora
</a>
  <button
  class="logout-btn"
>
  <i class="fa-solid fa-arrow-right-from-bracket"></i>
  <span>Logout</span>
  </button>

    </nav>

  </div>

  </header>
  <!-- =========================
       MAIN
  ========================= -->

  <main class="add-review-page">
<section class="explore-hero">

  <div class="explore-hero-content">

    <span class="explore-kicker">
      COMMUNITY
    </span>

    <h1>
      Esplora
    </h1>

    <p>
      Le ultime recensioni pubblicate da voi!
    </p>

  </div>

</section>

    <section class="explore-section">

<div class="profile-filters explore-filters">

  <input
    type="text"
    id="exploreSearch"
    placeholder="Cerca un film..."
  >

  <select id="exploreRating">
    <option value="all">Tutti i voti</option>
    <option value="5">★★★★★</option>
    <option value="4">★★★★</option>
    <option value="3">★★★</option>
    <option value="2">★★</option>
    <option value="1">★</option>
  </select>

  <select id="exploreType">
    <option value="all">
      Tutto
    </option>

    <option value="reviews">
      Recensioni
    </option>

    <option value="ratings">
      Solo voti
    </option>
  </select>

  <select id="exploreOrder">
    <option value="recent">
      Più recenti
    </option>

    <option value="old">
      Più vecchie
    </option>

    <option value="highest">
      Voto più alto
    </option>

    <option value="lowest">
      Voto più basso
    </option>
  </select>

</div>
    <section id="exploreFeed"></section>
  </main>
  <h2 class="explore-title">
  Le ultime recensioni
</h2>

<div id="exploreReviews"></div>
<button id="loadMoreBtn">
  Carica altre recensioni
</button>
<h2 class="explore-title votes-title">
  Voti rapidi della community
</h2>
  
<div id="exploreRatings"></div>
  
</div>


  <div class="mobile-tabbar">

  <a
    href="index.html"
    class="tab-item"
  >
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <a
    href="archivio.html"
    class="tab-item"
  >
    <i class="fa-solid fa-database"></i>
    <span>Database</span>
  </a>

  <a
    href="profilo.html"
    class="tab-item"
  >
    <i class="fa-solid fa-user"></i>
    <span>Profilo</span>
  </a>

  <a
    href="add-review.html"
    class="tab-item active"
  >
    <i class="fa-solid fa-pen"></i>
    <span>Scrivi</span>
  </a>

  <button
    class="tab-item logout-tab logout-btn"
  >
    <i class="fa-solid fa-right-from-bracket"></i>
    <span>Logout</span>
  </button>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/explore.js"></script>
</body>

</html>
