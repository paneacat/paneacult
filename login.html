<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>paneacult</title>
<meta name="mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="img/icon-192.png">
<link rel="icon" type="image/png" href="img/icon-512.png">
<link rel="icon" href="img/icon-192.png">
  <link rel="stylesheet" href="style.css?v=9">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="scriptapp.js" defer></script>
  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
  <div class="container header-inner">

    <div class="logo-block">
      <h1 class="logo">paneacult</h1>
      <p class="logo-subtitle">MY THERAPIST SAYS CINEMA</p>
    </div>

    <nav class="menu">
      <a href="index.html">HOME</a>
      <a href="archivio.html">RECENSIONI</a>
      <a href="featured.html">CHI SONO</a>
      <a href="contatti.html">CONTATTI</a>
      <a href="login.html" class="active">LOGIN</a>
    </nav>

  </div>
</header>

<!-- APP -->
<main class="app">

  <!-- LOGIN -->
  <div class="app-top">
    <div id="auth">
      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
      <button onclick="login()">Entra</button>
    </div>
  </div>

  <!-- CONTENUTO -->
  <div class="app-content">

    <div class="app-left">

      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input class="search-bar" placeholder="Cerca film..." oninput="setSearch(this.value)">
      </div>

      <div id="list"></div>

    </div>

  </div>

</main>

<!-- MODAL -->
<div id="addModal" class="add-modal">

  <div class="modal-content">

    <h2>Aggiungi film</h2>

    <input
      type="text"
      id="title"
      placeholder="Titolo film"
      oninput="handleInput(this.value)"
    >

    <div id="suggestions"></div>

    <button onclick="addFilm()"    Aggiungi
    </button>

  </div>
</div>
</div


<!-- FAB -->
<button class="fab" onclick="openModal()">+</button>

<script src="scriptapp.js" defer></script>

</body>
</html>
