<head>

    content="width=device-width, initial-scale=1.0"
  >

    name="description"
    content="Recensioni cinematografiche tra ossessioni visive, classici e cinema contemporaneo."

>

    content="#0b2f44"
  >

    content="paneacult"
  >

  <!-- =========================
       ICONS
  ========================= -->
  
<!-- APPLE -->

<link
  rel="apple-touch-icon"
  sizes="180x180"
  href="img/apple-icon-180.png"
>

<!-- ANDROID -->

<link
  rel="icon"
  type="image/png"
  sizes="192x192"
  href="img/icon-192.png"
>

<link
  rel="icon"
  type="image/png"
  sizes="512x512"
  href="img/icon-512.png"
>

  <!-- =========================
       MANIFEST
  ========================= -->

  <link rel="manifest" href="/manifest.json?v=5">
  <!-- =========================
       SEO / SOCIAL
  ========================= -->

  <meta
    property="og:title"
    content="paneacult"
  >

  <meta
    property="og:description"
    content="Il cinema non è intrattenimento. È ciò che resta."
  >

 <meta
  property="og:image"
  content="https://paneacult.com/img/logo.png"
>
  <meta
    property="og:type"
    content="website"
  >

  <meta
  property="og:url"
  content="https://paneacult.com/login.html"
>
<link
  rel="canonical"
  href="https://paneacult.com/login.html"
>

  <meta
    name="twitter:card"
    content="summary_large_image"
  >

  <!-- =========================
       FONTS
  ========================= -->

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"

  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700;800&display=swap"
    rel="stylesheet"

  <!-- =========================
       ICONS
  ========================= -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  >

  <!-- =========================
       CSS
  ========================= -->

  <link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/login.css">
<link rel="stylesheet" href="css/mobile.css">
  
</head>


  <body class="login-page">
    <div class="cursor"></div>

  <!-- =========================
       HEADER
  ========================= -->

  <a href="index.html" class="login-brand">
  ← paneacult
  </a>

<!-- =========================
     LOGIN HERO
========================= -->

<section class="login-hero">

  <div class="login-overlay"></div>

  <div class="login-content">

    <h1 class="login-title">
      I film che restano.
    </h1>

    <p class="login-subtitle">
      Per chi continua a pensare ai film anche dopo i titoli di coda.
    </p>

    <form
  class="login-form"
  autocomplete="on"
>

  <input
    type="email"
    placeholder="Email"
    autocomplete="email"
  >

  <input
    type="password"
    placeholder="Password"
    autocomplete="current-password"
  >

  <div class="auth-switch">

  <button
  type="submit"
  class="auth-switch-btn active login-btn"
>
  Accedi
  </button>
    
  <span class="auth-divider"></span>

  <button
  type="button"
  class="auth-switch-btn register-btn"
>
  Registrati
  </button>

</div>

<button
  id="googleLoginBtn"
  class="google-login-btn"
>

  <i class="fa-brands fa-google"></i>

  Continua con Google

</button>
    </form>
    
    <p class="login-footer">
      Costruisci il tuo archivio cinematografico.
    </p>
  </div>
</section>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
    <script src="js/write-review.js"></script>
    
</body>
</html>
