<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>paneacult</title>
<meta name="mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="img/icon-192.png">
<link rel="icon" type="image/png" href="img/icon-512.png">
<link rel="icon" href="img/icon-192.png">
  <link rel="stylesheet" href="style.css?v=9">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="scriptapp.js" defer></script>
  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
  <div class="container header-inner">

    <div class="logo-block">
      <h1 class="logo">paneacult</h1>
      <p class="logo-subtitle">MY THERAPIST SAYS CINEMA</p>
    </div>

    <nav class="menu">
      <a href="index.html">HOME</a>
      <a href="archivio.html">RECENSIONI</a>
      <a href="featured.html">CHI SONO</a>
      <a href="contatti.html">CONTATTI</a>
      <a href="login.html" class="active">LOGIN</a>
    </nav>

  </div>
</header>

<section class="hero-login">

  <div class="hero-left">

    <p class="mini-brand">
      MY THERAPIST SAYS CINEMA
    </p>

    <h1 class="logo-title">
      paneacult
    </h1>

    <h2 class="hero-title">
      I film che restano.
    </h2>

    <p class="hero-text">
      Recensioni, archivi personali,
      film salvati e ossessioni cinematografiche.
    </p>

    <div class="login-card">

      <input
        type="email"
        id="email"
        placeholder="Email"
      >

      <input
        type="password"
        id="password"
        placeholder="Password"
      >

      <div class="login-buttons">
        <button onclick="login()">
          Accedi
        </button>

        <button onclick="register()" class="secondary-btn">
          Registrati
        </button>
      </div>

    </div>

    <p class="hero-quote">
      “That rug really tied the room together.”
    </p>

  </div>

  <div class="hero-right">

    <img
      src="starwars.jpg"
      class="poster poster-1"
    >

    <img
      src="batmanreturns.jpg"
      class="poster poster-2"
    >

    <img
      src="lebowski.jpg"
      class="poster poster-3"
    >

    <img
      src="tenenbaum.jpg"
      class="poster poster-4"
    >

  </div>

</section>


<!-- FAB -->
<button class="fab" onclick="openModal()">+</button>

<script src="scriptapp.js" defer></script>

</body>
</html>
