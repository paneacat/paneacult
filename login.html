<body class="home">

<header class="header">
  <div class="container header-inner">
    <div class="logo-block">
      <h1 class="logo">paneacult</h1>
      <p class="logo-subtitle">MY THERAPIST SAYS CINEMA</p>
    </div>

    <nav class="menu">
      <a class="active" href="#">HOME</a>
      <a href="archivio.html">RECENSIONI</a>

      <a href="contatti.html">CONTATTI</a>
    </nav>

  </div>

</header>
<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Entra</button>
</div>
  <div class="container">

    <h1>paneacult</h1>
    
<div class="search-wrapper">
  <span class="search-icon">🔍</span>
  <input class="search-bar" placeholder="Cerca film..." oninput="setSearch(this.value)">
</div>

    <div id="list"></div>

  </div>

  <div id="addModal" class="modal">
    <div class="modal-content">

      <h2>Aggiungi film</h2>

      <input 
        id="title" 
        placeholder="Titolo..." 
        autocomplete="off"
        oninput="handleInput(this.value)"
      >

      <div id="suggestions"></div>

      <button onclick="addFilm()">Salva</button>
      <button onclick="closeModal()">Chiudi</button>

    </div>
  </div>

  <nav class="bottom-nav">
    <button onclick="scrollToTop()">🎬</button>
  </nav>
<button class="fab">+</button>
