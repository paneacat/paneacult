<link rel="stylesheet" href="css/components.css">

<link rel="stylesheet" href="css/mobile.css">

  <link

  >

  <meta

  href="https://paneacult.com/profilo.html"
>

</head>

<body class="profile-page">

<div class="cursor"></div>

<!-- =========================
     HEADER
========================= -->

<header class="profile-header">

  <div class="profile-header-inner">

    <a
      href="index.html"
      class="profile-logo"
    >
      paneacult
    </a>

    <nav class="profile-nav">

  <a
    href="index.html"
  >
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <a
    href="add-review.html"
  >
    <i class="fa-solid fa-film"></i>
    <span>Database</span>
  </a>

  <a
  href="profilo.html"
  class="active"
>
  <i class="fa-solid fa-user"></i>
  <span>Profilo</span>
  </a>

  <button
  class="logout-btn"
>
  <i class="fa-solid fa-arrow-right-from-bracket"></i>
  <span>Logout</span>
  </button>

    </nav>

  </div>

</header>

<!-- =========================
     USER INFO
========================= -->
<section class="profile-hero">

  <div class="profile-user-meta">

  <div class="profile-avatar">
    
    <img
  id="profileAvatarImg"
  src="img/default-avatar.webp"
>
  </div>
<p
  class="profile-username"
  id="profileUsername"
>
  @username
</p>

<p
  class="profile-bio"
  id="profileBio"
>
  scrivi qualcosa di te
</p>
<button id="editProfileBtn">
  ⚙ Modifica profilo
</button>
  <div class="profile-stats">

    <div class="profile-stat">

      <span id="filmsCount">0</span>

      <p>Film visti</p>

    </div>

    <div class="profile-stat">

      <span id="reviewsCount">0</span>

      <p>Recensioni scritte</p>

    </div>

    <div class="profile-stat">

      <span id="favoritesCount">0</span>

      <p>Preferiti</p>

    </div>

  </div>

  </div>
</section>

  <div class="profile-edit">

    <input
      type="file"
      id="avatarInput"
      accept="image/*"
    >

    <input
      type="text"
      id="usernameInput"
      placeholder="Username"
    >

    <textarea
      id="bioInput"
      placeholder="La tua frase"
    ></textarea>

    <button id="saveProfileBtn">
      Salva profilo
    </button>

  </div>
  
  <section class="favorite-section">
  <div class="section-head">

    <div>

    </div>

  </div>
  
  <div
  class="current-favorite"
  id="currentFavorite">
  </div>
  </section>

<!-- =========================
     LISTE
========================= -->
<section class="saved-section">

  <div class="section-head">

    <div>

      <p class="section-kicker">
        WATCHLIST
      </p>

    </div>

  </div>

  <div
    class="saved-grid"
    id="watchlistGrid"
  ></div>

</section>


<section class="saved-section">

  <div class="section-head">

    <div>

      <p class="section-kicker">
        WATCHED
      </p>

    </div>

  </div>

  <div
    class="saved-grid"
    id="watchedGrid"
  ></div>

</section>

<section class="saved-section">

  <div class="section-head">

    <div>

      <p class="section-kicker">
        LOVED
      </p>

    </div>

  </div>

  <div
    class="saved-grid"
    id="favoriteGrid"
  ></div>

</section>
  
<section class="saved-section">

  <div class="section-head">

    <div>

      <p class="section-kicker">
        ATTIVITÀ RECENTE
      </p>

    </div>

  </div>

  <div
  class="activity-feed"
  id="activityFeed"
></div>
  
</section>
  
<script src="js/ui.js"></script>
<script src="js/tmdb.js"></script>
<script src="js/write-review.js"></script>
<script src="js/profile.js"></script>
  <script>

async function checkUser(){

  const {
    data: { session }
  } =
  await supabaseClient.auth.getSession();

  if(!session){

    window.location.href =
      "login.html";

    return;

  }

  const emailBox =
    document.getElementById(
      "profileEmail"
    );

  if(emailBox){

    emailBox.textContent =
      session.user.email;

  }

}

checkUser();

  </script>
  <div class="mobile-tabbar">

  <a
    href="index.html"
    class="tab-item"
  >
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <a
    href="add-review.html"
    class="tab-item"
  >
    <i class="fa-solid fa-database"></i>
    <span>Database</span>
  </a>

  <a
    href="profilo.html"
    class="tab-item active"
  >
    <i class="fa-solid fa-user"></i>
    <span>Profilo</span>
  </a>
    
  <button
    class="tab-item logout-tab logout-btn"
  >
    <i class="fa-solid fa-right-from-bracket"></i>
    <span>Logout</span>
  </button>

  </div>
</body>
</html>
