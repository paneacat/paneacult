<!DOCTYPE html>

<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<title>paneacult — conferma</title>

<style>

body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0d2e40;
  font-family:Inter,sans-serif;
  color:#f5f1e8;
}

.box{
  width:90%;
  max-width:520px;
  padding:60px 40px;
  border-radius:28px;
  text-align:center;

  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);

  backdrop-filter:blur(10px);
}

.logo{
  color:#fdc103;
  font-size:54px;
  font-family:Georgia,serif;
  margin-bottom:8px;
  font-weight:bold;
}

.tag{
  letter-spacing:4px;
  font-size:11px;
  text-transform:uppercase;
  opacity:0.7;
  margin-bottom:50px;
}

h1{
  font-size:38px;
  margin-bottom:18px;
}

p{
  font-size:18px;
  line-height:1.7;
  opacity:0.9;
}

.quote{
  margin-top:36px;
  color:#fdc103;
  font-weight:600;
}

a{
  display:inline-block;
  margin-top:42px;
  padding:18px 34px;

  background:#fdc103;
  color:#0d2e40;

  border-radius:999px;
  text-decoration:none;
  font-weight:700;

  transition:0.3s;
}

a:hover{
  transform:translateY(-2px);
}

</style>
</head>

<body>

<div class="box">

<div class="logo">paneacult</div>

</div>

</html>
